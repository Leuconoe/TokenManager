name: Build & Release

# main push에서 pubspec.yaml 의 version 이 올라갔을 때만 (= 해당 버전 태그가
# 아직 없을 때만) Android APK + Windows + 크롬 익스텐션을 병렬 빌드하고 하나의
# GitHub Release(v<version>)에 모읍니다. workflow_dispatch 는 항상 강제 실행.
on:
  push:
    branches: [main]
    paths:
      - 'pubspec.yaml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.2'

jobs:
  # --------------------------------------------------------------- Version gate
  # Releases only when pubspec's version is new (no matching tag yet).
  version:
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.v.outputs.ver }}
      tag: ${{ steps.v.outputs.tag }}
      should_release: ${{ steps.v.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # need tags for the existence check
      - id: v
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d '[:space:]')
          TAG="v${VER/+/-}" # git-safe tag (1.0.0+3 -> v1.0.0-3)
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — forcing release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — version not bumped, skipping build."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $VER ($TAG) — will build & release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------- Android
  android:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', channel: stable, cache: true }
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test
      - name: Configure Android release signing
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KS_B64" ]; then echo "No signing secret — debug-signed."; exit 0; fi
          echo "$KS_B64" | base64 -d > android/app/release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release.jks\n' \
            "$KS_PW" "$KEY_PW" "$KEY_ALIAS" > android/key.properties
          echo "Release signing configured."
      # arm64-v8a only — keeps the APK ~25MB (vs a ~70MB universal/fat APK).
      - run: flutter build apk --release --target-platform android-arm64
      - name: Stage APK
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-release.apk "out/TokenManager-${VER}-b${{ github.run_number }}-arm64.apk"
      - uses: actions/upload-artifact@v4
        with: { name: android, path: out/* }

  # ---------------------------------------------------------------- Windows
  windows:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', channel: stable, cache: true }
      - name: Install OpenSSL + resolve OPENSSL_ROOT_DIR (SQLCipher dep)
        shell: pwsh
        run: |
          choco install openssl --no-progress -y
          # Find the install dir that actually has the dev headers.
          $root = Get-ChildItem 'C:\Program Files' -Directory -Filter 'OpenSSL*' |
            Where-Object { Test-Path (Join-Path $_.FullName 'include\openssl\opensslv.h') } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $root) { throw 'OpenSSL dev install not found' }
          # slproweb puts import libs under lib\VC\x64\MD; FindOpenSSL looks in lib\.
          $vc = Join-Path $root 'lib\VC\x64\MD'
          if (Test-Path $vc) { Copy-Item "$vc\*.lib" (Join-Path $root 'lib') -Force }
          "OPENSSL_ROOT_DIR=$root" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "OPENSSL_ROOT_DIR=$root"
          Get-ChildItem (Join-Path $root 'lib') -Filter '*crypto*' -ErrorAction SilentlyContinue
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release
      - name: Zip Windows build
        shell: pwsh
        run: |
          $ver = (Select-String '^version:' pubspec.yaml).Line -replace 'version:\s*',''
          New-Item -ItemType Directory -Force out | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "out/TokenManager-$ver-b${{ github.run_number }}-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with: { name: windows, path: out/* }

  # -------------------------------------------------------------- Extension
  extension:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Build extension
        working-directory: extension
        run: |
          npm ci
          npm run build
      - name: Zip extension
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          mkdir -p out
          (cd extension/dist && zip -r "$GITHUB_WORKSPACE/out/TokenManager-${VER}-b${{ github.run_number }}-extension.zip" .)
      - uses: actions/upload-artifact@v4
        with: { name: extension, path: out/* }

  # ---------------------------------------------------------------- Release
  release:
    needs: [version, android, windows, extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # release-notes 자동 생성용
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: TokenManager ${{ needs.version.outputs.ver }}
          generate_release_notes: true   # auto commit-log appended after the curated notes
          body_path: RELEASE_NOTES.md    # curated notes (edit per release)
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
