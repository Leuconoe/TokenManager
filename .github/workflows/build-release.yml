name: Build & Release APK

# main 브랜치 push 시 자동으로 APK 빌드 → GitHub Release 생성/갱신.
# 문서/마크다운만 바뀐 커밋은 빌드 생략.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch: {}

permissions:
  contents: write   # 릴리즈 생성 + 태그 push에 필요

concurrency:
  group: build-release
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.2'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 릴리즈 노트 자동 생성(이전 태그 대비)용 전체 히스토리

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Codegen (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Unit tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with build metadata
        id: apk
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          SHA_SHORT=$(git rev-parse --short HEAD)
          NAME="tokenmanager-${VER}-b${{ github.run_number }}-${SHA_SHORT}.apk"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/${NAME}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: TokenManager ${{ steps.apk.outputs.version }} (build ${{ github.run_number }})
          generate_release_notes: true   # 이전 태그 이후 커밋 자동 정리
          body: |
            ### TokenManager 자동 빌드
            - **Version**: `${{ steps.apk.outputs.version }}`
            - **Build**: `#${{ github.run_number }}`
            - **Commit**: ${{ github.sha }} (`${{ steps.apk.outputs.sha_short }}`)
            - **APK**: `${{ steps.apk.outputs.name }}` (release, debug-key 서명)

            > ⚠️ debug 키로 서명된 빌드입니다. 배포 전 release 키 서명 구성 필요.

            ---
          files: dist/${{ steps.apk.outputs.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
