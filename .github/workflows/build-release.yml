name: Build & Release

# main push 시 Android APK + Windows + 크롬 익스텐션을 병렬 빌드하고
# 하나의 GitHub Release(build-<run>)에 모읍니다. 문서/마크다운만 바뀌면 생략.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.2'

jobs:
  # ---------------------------------------------------------------- Android
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', channel: stable, cache: true }
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --release
      - name: Stage APK
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-release.apk "out/TokenManager-${VER}-b${{ github.run_number }}.apk"
      - uses: actions/upload-artifact@v4
        with: { name: android, path: out/* }

  # ---------------------------------------------------------------- Windows
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', channel: stable, cache: true }
      - name: Install OpenSSL (SQLCipher dependency)
        run: choco install openssl --no-progress -y
        shell: pwsh
      - name: Set OPENSSL_ROOT_DIR
        run: echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL-Win64" >> $env:GITHUB_ENV
        shell: pwsh
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release
      - name: Zip Windows build
        shell: pwsh
        run: |
          $ver = (Select-String '^version:' pubspec.yaml).Line -replace 'version:\s*',''
          New-Item -ItemType Directory -Force out | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath "out/TokenManager-$ver-b${{ github.run_number }}-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with: { name: windows, path: out/* }

  # -------------------------------------------------------------- Extension
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Build extension
        working-directory: extension
        run: |
          npm ci
          npm run build
      - name: Zip extension
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          mkdir -p out
          (cd extension/dist && zip -r "$GITHUB_WORKSPACE/out/TokenManager-${VER}-b${{ github.run_number }}-extension.zip" .)
      - uses: actions/upload-artifact@v4
        with: { name: extension, path: out/* }

  # ---------------------------------------------------------------- Release
  release:
    needs: [android, windows, extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # release-notes 자동 생성용
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Resolve version
        id: meta
        run: echo "ver=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: TokenManager ${{ steps.meta.outputs.ver }} (build ${{ github.run_number }})
          generate_release_notes: true
          body: |
            ### TokenManager 자동 빌드 #${{ github.run_number }}
            - **Version**: `${{ steps.meta.outputs.ver }}` · **Commit**: ${{ github.sha }}
            - 📱 Android APK · 🖥️ Windows x64 zip · 🧩 Chrome 익스텐션 zip

            > ⚠️ Android/Windows는 debug 키 서명. 배포 전 release 키 구성 필요.
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
